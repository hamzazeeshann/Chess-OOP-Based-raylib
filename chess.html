<!doctypehtml><html lang=en><head><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Chess – WebAssembly</title><meta content="A classic Chess game compiled to WebAssembly with Raylib and Emscripten."name=description><style>@import url(https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap);*,::after,::before{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0d0d0d;--surface:#1a1a1a;--gold:#e8b400;--gold-dim:#a07c00;--text:#e8e8e8;--muted:#888}body,html{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden}header{width:100%;padding:18px 32px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #2a2a2a;background:var(--surface)}.logo{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--gold)}.logo span{color:var(--text);font-weight:300}.badge{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dim);border-radius:99px;padding:2px 10px}main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;gap:24px;width:100%}.canvas-shell{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 0 2px var(--gold-dim),0 24px 80px rgba(0,0,0,.85),0 0 60px rgba(232,180,0,.08);background:#111}#loadingOverlay{position:absolute;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10;transition:opacity .5s ease}#loadingOverlay.hidden{opacity:0;pointer-events:none}.spinner{width:48px;height:48px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{font-size:15px;color:var(--muted)}#loadPct{color:var(--gold);font-weight:600}canvas#canvas{display:block;image-rendering:pixelated}.info-strip{display:flex;gap:32px;align-items:center;font-size:13px;color:var(--muted)}.info-strip strong{color:var(--text)}footer{padding:16px;font-size:12px;color:#444;text-align:center}</style></head><body><header><div class=logo>♟ Chess <span>WebGL</span></div><div class=badge>WebAssembly</div></header><main><div class=canvas-shell><div id=loadingOverlay><div class=spinner></div><div class=load-text>Loading game… <span id=loadPct>0%</span></div></div><canvas height=800 id=canvas width=800></canvas></div><div class=info-strip><span>Click a piece to select  ·  Click a highlighted square to move</span> <span>Castling & pawn promotion supported</span></div></main><footer>Built with Raylib + Emscripten  |  Compiled to WebAssembly</footer><script>var Module={canvas:document.getElementById("canvas"),setStatus:function(t){var n=t.match(/(\d+(\.\d+)?)\/(\d+)/);if(n){var e=Math.round(parseInt(n[1])/parseInt(n[3])*100);document.getElementById("loadPct").textContent=e+"%"}if(!t){var o=document.getElementById("loadingOverlay");o.classList.add("hidden"),setTimeout((function(){o.style.display="none"}),600)}},monitorRunDependencies:function(t){0===t&&Module.setStatus("")},onRuntimeInitialized:function(){Module.setStatus("")},print:function(t){console.log("[chess]",t)},printErr:function(t){console.error("[chess]",t)}};window.onerror=function(t,n,e,o,s){Module.setStatus("Exception thrown – see console")}</script><script async src=chess.js></script></body></html>
